name: Feature Request
description: Suggest a feature or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: We'd love to hear your ideas for making InTandem better.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include tool names, UX flow, or protocol changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds exist today? Why aren't they sufficient?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Task Board
        - Messaging / Findings
        - Connection / Networking
        - Tool Delegation
        - Agent Spawning
        - CLI / Setup
        - Security
        - Other
    validations:
      required: true
